<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<meta name="theme-color" content="#0E7A46"/>
<meta name="robots" content="noindex, nofollow"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>Kopi Talk — Spot the Prospect (Muchen)</title>
<style>
  :root{
    --navy:#0B6E40; --navy2:#0E7A46; --blue:#12925A; --ice:#BCE8CE; --ice2:#E4F6EC;
    --gold:#15C06A; --gold2:#46D98F; --ink:#123524; --mute:#5C7A69; --white:#fff;
    --good:#1f8a54; --bad:#c0392b; --paper:#F7FCF9;
    --shadow:0 12px 34px rgba(6,40,24,.20);
  }
  *{box-sizing:border-box}
  html{-webkit-text-size-adjust:100%}
  body{margin:0;font-family:"Segoe UI",Calibri,Arial,sans-serif;color:var(--ink);
    background:radial-gradient(1200px 600px at 50% -10%,#1FA35E 0%,#0E7A46 40%,#064E2B 100%);
    background-attachment:fixed;-webkit-tap-highlight-color:transparent;
    min-height:100vh;min-height:100dvh;
    padding:22px 14px 40px;
    padding-left:max(14px,env(safe-area-inset-left));padding-right:max(14px,env(safe-area-inset-right))}
  .wrap{max-width:720px;margin:0 auto}
  header.top{display:flex;justify-content:space-between;align-items:flex-end;gap:12px;flex-wrap:wrap;margin-bottom:16px}
  .brand .kick{color:var(--gold);font-weight:700;letter-spacing:3px;font-size:11px}
  .brand h1{margin:2px 0 0;color:#fff;font-family:Cambria,Georgia,serif;font-size:25px;font-weight:800}
  .brand h1 span{color:var(--gold2)}

  .card{background:var(--paper);border-radius:20px;box-shadow:var(--shadow);padding:24px;animation:pop .3s ease}
  @keyframes pop{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
  .lead{color:var(--mute);font-size:15px;line-height:1.6}
  .scene-title{font-family:Cambria,Georgia,serif;color:var(--navy);font-size:23px;font-weight:800;margin:0 0 6px}
  input.name{width:100%;padding:13px 15px;border:2px solid var(--ice);border-radius:12px;font-size:16px;font-family:inherit;margin-top:8px}
  input.name:focus{outline:none;border-color:var(--gold)}

  .grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:20px}
  @media(max-width:620px){.grid{grid-template-columns:1fr}}
  .pick{border:2px solid var(--ice);background:#fff;border-radius:16px;padding:16px;cursor:pointer;transition:.16s;-webkit-user-select:none;user-select:none;display:flex;gap:12px;align-items:flex-start}
  .pick:hover{border-color:var(--gold);transform:translateY(-3px);box-shadow:var(--shadow)}
  .pick:active{transform:scale(.99)}
  .pick .em{font-size:30px;line-height:1}
  .pick h3{margin:0 0 3px;color:var(--navy);font-size:17px}
  .pick .sub{color:var(--mute);font-size:12.5px;line-height:1.45}

  .nav{display:flex;justify-content:space-between;gap:10px;margin-top:22px;align-items:center}
  button.btn{border:0;border-radius:11px;padding:12px 20px;font-weight:800;font-size:14px;cursor:pointer;font-family:inherit;-webkit-user-select:none;user-select:none;touch-action:manipulation}
  button.btn:active{transform:scale(.97)}
  .btn.primary{background:var(--navy);color:#fff}.btn.primary:hover{background:var(--blue)}
  .btn.gold{background:var(--gold);color:#fff}.btn.gold:hover{background:var(--gold2)}
  .btn.ghost{background:#fff;color:var(--navy);border:1.5px solid var(--ice)}.btn.ghost:hover{border-color:var(--blue)}

  .who{display:flex;align-items:center;gap:11px;border-bottom:1px solid #E7ECF6;padding-bottom:12px;margin-bottom:4px}
  .who .em{font-size:30px}
  .who .n{font-weight:800;color:var(--navy);font-size:17px}
  .who .s{font-size:12px;color:var(--mute);line-height:1.35}
  .prog{font-size:11px;font-weight:800;color:var(--gold);letter-spacing:1.5px;text-transform:uppercase}
  .log{display:flex;flex-direction:column;gap:10px;padding:14px 2px 4px;min-height:120px}
  .msg{max-width:84%;padding:10px 14px;border-radius:16px;font-size:14.5px;line-height:1.5;white-space:pre-wrap;word-wrap:break-word;animation:pop .25s ease}
  .msg.them{align-self:flex-start;background:#EEF2FB;color:var(--ink);border-bottom-left-radius:5px}
  .msg.me{align-self:flex-end;background:var(--navy);color:#fff;border-bottom-right-radius:5px}
  .msg.coach{align-self:center;max-width:94%;background:#FBF6E4;border:1px solid #ecdca0;color:#6b5a1a;font-size:12.5px;border-radius:12px}
  .msg.coach.good{background:#E9F6EE;border-color:#b8e2c8;color:#1c6b41}
  .msg.coach.bad{background:#FDECEA;border-color:#f2c4bc;color:#a5301f}

  .choices{display:grid;gap:10px;margin-top:16px}
  .choice{border:2px solid #E1E7F5;border-radius:14px;padding:12px 15px;cursor:pointer;background:#fff;transition:.14s;font-size:14.5px;line-height:1.45;-webkit-user-select:none;user-select:none}
  .choice:hover{border-color:var(--blue);background:#F5F9FF;transform:translateX(3px)}
  .choice:active{border-color:var(--blue);transform:scale(.99)}
  .choice .lbl{font-size:11px;font-weight:800;color:var(--mute);letter-spacing:.5px}

  .debrief{background:#EAF7F0;border:1px solid #BFE6CF;border-radius:14px;padding:16px 18px;margin-top:14px;font-size:14px;line-height:1.6;color:var(--ink)}
  .debrief h4{margin:0 0 8px;color:var(--navy)}
  .debrief ul{margin:6px 0 0;padding-left:18px}.debrief li{margin:5px 0}
  .debrief .miss b,.debrief .catch b{color:var(--navy)}
  .method{background:#E4F6EC;border:1px solid #BFE6CF;border-radius:12px;padding:12px 14px;margin-top:14px;font-size:13px;color:var(--navy)}
  .method b{color:var(--blue)}
  .finalscore{text-align:center;padding:4px 0 2px}
  .finalscore .big{font-family:Cambria,Georgia,serif;font-size:42px;font-weight:800;color:var(--navy);line-height:1}
  .finalscore .verdict{font-size:15px;color:var(--mute);margin-top:6px}
  .medal{font-size:32px}
  table.lb{width:100%;border-collapse:collapse;font-size:13.5px}
  table.lb th,table.lb td{padding:9px 10px;text-align:left;border-bottom:1px solid #E7ECF6}
  table.lb th{color:var(--mute);font-size:11px;letter-spacing:1px;text-transform:uppercase}
  table.lb tr.me{background:#FBF1CE}
  table.lb td.sc{font-weight:800;text-align:right}
  .lbwrap{overflow-x:auto;-webkit-overflow-scrolling:touch;margin-top:10px}

  .foot{color:var(--ice);text-align:center;font-size:11.5px;margin-top:22px;line-height:1.6}
  .foot a{color:var(--gold2);text-decoration:none} .foot b{color:var(--gold2)}

  @media(hover:none){.pick:hover{border-color:var(--ice);transform:none;box-shadow:none}.choice:hover{border-color:#E1E7F5;background:#fff;transform:none}}
  @media(max-width:560px){
    body{padding:12px 12px 24px}
    .card{padding:18px 15px;border-radius:16px}
    .brand h1{font-size:20px}
    button.btn{flex:1;min-height:46px}
    .nav>span:empty{display:none}
    .finalscore .big{font-size:36px}
  }
  .bgm-btn{position:fixed;right:14px;bottom:14px;z-index:60;width:44px;height:44px;border-radius:50%;border:0;
    background:rgba(255,255,255,.92);color:var(--navy);font-size:19px;cursor:pointer;line-height:1;
    box-shadow:0 5px 16px rgba(6,40,24,.3);transition:.15s}
  .bgm-btn:active{transform:scale(.92)} .bgm-btn.off{opacity:.55}
  @media(max-width:560px){.bgm-btn{right:10px;bottom:10px;width:40px;height:40px;font-size:17px}}
  .lang-btn{background:rgba(255,255,255,.14);color:#fff;border:1px solid rgba(255,255,255,.38);border-radius:999px;
    padding:6px 15px;font-size:13px;font-weight:800;cursor:pointer;font-family:inherit;align-self:center;white-space:nowrap}
  .lang-btn:active{transform:scale(.96)}
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <div class="brand">
      <div class="kick" id="kick">MUCHEN CORPORATE SERVICES · SEMINAR RECAP</div>
      <h1>Kopi <span>Talk</span></h1>
    </div>
    <button id="langBtn" class="lang-btn" onclick="toggleLang()" aria-label="Language / 语言">中文</button>
  </header>
  <div id="app"></div>
  <div class="foot">
    <span id="footTxt">A choose-your-reply game to practise <b>Signal → Service → Question</b> from “Spotting Prospects Through Corporate Knowledge”.</span><br>
    <a href="/">RM500 Startup</a> · <a href="/nasi-lemak">Nasi Lemak Empire</a> · <a href="/shareholder">Boardroom Betrayal</a> · <span id="footNote">A training game, not advice.</span>
  </div>
</div>

<script>
/* ============================================================
   KOPI TALK — a choose-your-reply prospecting game (no AI).
   You sit for coffee with a business owner. Each carries hidden
   "signals" that map to a Muchen service. Pick your replies to
   spot the signal, ask ONE good diagnostic question, and route
   the lead — WITHOUT hard-selling. Random prospect + shuffled
   signals mean every conversation is different.
   ============================================================ */
var app = document.getElementById('app');
function rint(n){ return Math.floor(Math.random()*n); }
function shuffle(a){ a=a.slice(); for(var i=a.length-1;i>0;i--){var j=rint(i+1),t=a[i];a[i]=a[j];a[j]=t;} return a; }

/* ---- bilingual helpers ---- */
var LANG = (function(){
  try{ var q=new URLSearchParams(location.search).get('lang'); if(q==='zh'||q==='en'){ try{localStorage.setItem('muchen_lang',q);}catch(e){} return q; } }catch(e){}
  try{ return localStorage.getItem('muchen_lang')==='zh'?'zh':'en'; }catch(e){ return 'en'; }
})();
function T(en,zh){ return LANG==='zh'?zh:en; }
function L(o){ return o?(LANG==='zh'?o.zh:o.en):''; }        // localize {en,zh}
function nm(p){ return LANG==='zh'?p.nameZh:p.name; }
function sb(p){ return LANG==='zh'?p.subZh:p.sub; }
var VIEW=null;
function paintLang(){
  var b=document.getElementById('langBtn'); if(b) b.textContent = LANG==='zh'?'EN':'中文';
  document.documentElement.lang = LANG==='zh'?'zh':'en';
  document.getElementById('kick').textContent = T('MUCHEN CORPORATE SERVICES · SEMINAR RECAP','沐宸企业服务 · 研讨会复习');
  document.getElementById('footTxt').innerHTML = T('A choose-your-reply game to practise <b>Signal → Service → Question</b> from “Spotting Prospects Through Corporate Knowledge”.','用「选择你的回应」的游戏练习「<b>信号 → 服务 → 提问</b>」，取材自《通过企业知识发现潜在客户》。');
  document.getElementById('footNote').textContent = T('A training game, not advice.','这是培训游戏，并非建议。');
}
function toggleLang(){ LANG=LANG==='zh'?'en':'zh'; try{localStorage.setItem('muchen_lang',LANG);}catch(e){} paintLang(); if(VIEW) VIEW(); }

/* ============================================================
   PROSPECTS — each with an opener, three hidden signals
   (line → good/ok/poor replies), and a closer. Faithful to the
   seminar's Signal → Service → Question method.
   opt.q:  'good' = spotted + asked the right question
           'ok'   = noticed but didn't dig
           'poor' = hard-sell / dismiss (the cardinal sin)
   ============================================================ */
var PROSPECTS = {
  may: {
    em:'☕', name:'Aunty May', nameZh:'美姨',
    sub:'Runs a busy café. A friend set up her company years ago; she just wants to grow.',
    subZh:'经营一家忙碌的咖啡馆。几年前朋友帮她注册了公司；她只想把生意做大。',
    openers:[
      {en:'Eh, you came! Sit sit — Aunty just made fresh kopi. So how, business at your firm okay ah? My little café also getting busier, thank God.',
       zh:'哎哟你来啦！坐坐——阿姨刚泡好新鲜咖啡。怎样，你公司生意还好吗？我这小咖啡馆也越来越忙，谢天谢地。'},
      {en:'Aiyo finally free to lim kopi with Aunty! Sit. Try my kaya toast. You all do company paperwork stuff is it? I always blur about that one.',
       zh:'哎呀终于有空来陪阿姨喝咖啡了！坐。尝尝我的咖椰吐司。你们是做公司文书那些的对吧？那些我一向都搞不懂。'}
    ],
    openerOpts:[
      {t:{en:'“Aunty! Good to see you. Tell me how the café’s been going.”',zh:'「阿姨！很高兴见到你。跟我说说咖啡馆最近怎样。」'}, q:'good',
        r:{en:'Aunty’s face lights up — she happily tells you all about the new customers. She’s relaxed and open now.',zh:'阿姨眉开眼笑——高兴地跟你讲起了新客人。她现在放松又坦然。'}},
      {t:{en:'“This kopi is really good, ah. Perfect weather for it.”',zh:'「这咖啡真好喝。天气配它刚刚好。」'}, q:'ok',
        r:{en:'“Right? My secret is the butter,” she chuckles. A warm, easy start.',zh:'「对吧？我的秘诀是牛油，」她笑道。轻松温暖的开场。'}},
      {t:{en:'“Actually Aunty, let me tell you what services my firm can sell you.”',zh:'「其实阿姨，让我跟你介绍我们公司能卖你什么服务。」'}, q:'poor',
        r:{en:'Her smile tightens. “Aiyah, you also want to sell Aunty something ah? Let me drink my kopi first lah.”',zh:'她的笑容僵了僵。「哎呀，你也想推销东西给阿姨啊？让我先喝口咖啡啦。」'}}
    ],
    signals:[
      { svc:{en:'Company secretarial + Compliance & filing',zh:'公司秘书 + 合规与呈报'},
        line:{en:'You know, a friend helped me register my company — Sdn Bhd — back in 2019. Since then I never really touch all that paperwork. Don’t even know who my “company secretary” is anymore, or if I still have one!',
              zh:'你知道吗，2019年一个朋友帮我注册了公司——Sdn Bhd。之后那些文书我就没再碰过。我连自己的「公司秘书」是谁都不知道了，甚至不知道还有没有！'},
        opts:[
          {t:{en:'“Oh? When did you last file your annual return with SSM — do you know if it’s up to date?”',zh:'「哦？你上一次向 SSM 呈交年度申报是什么时候——知道有没有跟上进度吗？」'}, q:'good',
            r:{en:'“Aiyoh… annual return? I… don’t think so? Nobody told me leh.” You’ve found the thread.',zh:'「哎哟……年度申报？我……应该没有吧？也没人跟我讲。」你找到了线头。'}},
          {t:{en:'“Ya, all that paperwork is a headache for everyone.”',zh:'「是啊，那些文书人人都头疼。」'}, q:'ok',
            r:{en:'“Ya lor, so troublesome,” she sighs, and moves on.',zh:'「就是啊，好麻烦，」她叹口气，就带过了。'}},
          {t:{en:'“You need us to be your company secretary — sign here today.”',zh:'「你需要我们当你的公司秘书——今天就签这里。」'}, q:'poor',
            r:{en:'“Wah, so fast sell Aunty ah? Slow down lah.” She pulls back a little.',zh:'「哇，这么快就推销阿姨啊？慢慢来啦。」她稍微退了一步。'}}
        ]},
      { svc:{en:'Compliance rescue — SSM deadlines / strike-off risk',zh:'合规拯救——SSM 期限／被除名风险'},
        line:{en:'Oh ya — some months back I got a letter from SSM. Looked official… I just put it in the drawer. Haven’t looked properly. Probably nothing, right?',
              zh:'哦对——几个月前我收到一封 SSM 的信。看起来蛮官方的……我随手放进抽屉了，没好好看。应该没什么事吧？'},
        opts:[
          {t:{en:'“An SSM letter is worth a proper look — do you remember if it mentioned a deadline or a compound?”',zh:'「SSM 的信值得好好看看——你记得里面有没有提到期限或罚单吗？」'}, q:'good',
            r:{en:'“Deadline? Alamak. I better go dig it out tonight.” Now she’s paying attention.',zh:'「期限？哎呀。我今晚最好把它翻出来。」她这下认真了。'}},
          {t:{en:'“Ya, those official letters always so scary.”',zh:'「是啊，那些官方信总是吓人。」'}, q:'ok',
            r:{en:'“Right! So many words,” she laughs, and the moment passes.',zh:'「对！字那么多，」她笑了笑，话题就过去了。'}},
          {t:{en:'“Ignore SSM and they’ll strike you off — you MUST engage us now!”',zh:'「不理 SSM 他们会把你除名——你现在必须聘请我们！」'}, q:'poor',
            r:{en:'“Wah, don’t scare Aunty like that lah…” She looks uneasy — not with the problem, with you.',zh:'「哇，别这样吓阿姨啦……」她有点不安——不是因为问题，是因为你。'}}
        ]},
      { svc:{en:'Transaction advisory — issuing shares & agreement',zh:'交易顾问——发行股份与协议'},
        line:{en:'But good news! Café’s doing so well, my good friend wants to put in money to open a second outlet with me. Exciting, right? I just take her cash and we partner lor, simple.',
              zh:'不过有好消息！咖啡馆生意这么好，我一个好朋友想出钱跟我一起开第二间。很兴奋对吧？我就收她的钱，我们合伙咯，简单。'},
        opts:[
          {t:{en:'“That’s great — will she become a shareholder, and have you thought about how her shares and an agreement are set up?”',zh:'「太好了——她会成为股东吗？你有想过她的股份和一份协议要怎么安排吗？」'}, q:'good',
            r:{en:'“Shares? Agreement? …I never thought so far. Maybe I should, ah?” Spotted before the money moves.',zh:'「股份？协议？……我没想那么远。我是不是该想一下？」在钱动之前你就发现了。'}},
          {t:{en:'“Nice — congrats on the second outlet!”',zh:'「不错——恭喜你要开第二间！」'}, q:'ok',
            r:{en:'“Thank you, thank you!” A happy moment, but you didn’t dig.',zh:'「谢谢，谢谢！」气氛很好，但你没有深入。'}},
          {t:{en:'“Before you take a single cent, sign our engagement letter first.”',zh:'「你收一分钱之前，先签我们的委托书。」'}, q:'poor',
            r:{en:'“Aiya, you ah — always business.” The warmth cools a notch.',zh:'「哎呀，你这个人——总是生意。」气氛冷了一截。'}}
        ]},
    ],
    closer:{en:'“Wah, talking to you, Aunty feels clearer already. Come — one more kopi?”',zh:'「哇，跟你聊完，阿姨清楚多了。来——再来一杯咖啡？」'}
  },

  danish: {
    em:'💻', name:'Danish', nameZh:'达尼',
    sub:'Startup founder closing a funding round, drowning in lawyer emails.',
    subZh:'正在完成融资的创业者，被律师的邮件淹没。',
    openers:[
      {en:'Bro, thanks for meeting. Sorry I look wrecked — closing our seed round and the lawyers are killing me with emails. Anyway, how are you? Still at the corporate services firm?',
       zh:'兄弟，谢谢你来。抱歉我看起来很憔悴——在收尾种子轮，律师的邮件快把我搞死了。你呢？还在那家企业服务公司吗？'},
      {en:'Eh finally a break from the fundraising madness. Grab a seat. Warning: I might rant about lawyers for a bit.',
       zh:'哎，终于从融资的疯狂里抽身。坐吧。先警告你：我可能会吐槽律师一阵子。'}
    ],
    openerOpts:[
      {t:{en:'“Congrats on the round! How’s it actually going — you good?”',zh:'「恭喜融资！进展到底怎样——你还好吗？」'}, q:'good',
        r:{en:'“Honestly? Overwhelmed. But thanks for asking.” He relaxes and starts opening up.',zh:'「说真的？焦头烂额。不过谢谢你问。」他放松下来，开始敞开话匣子。'}},
      {t:{en:'“Nice spot this. Their flat white is solid.”',zh:'「这地方不错。他们的馥芮白很稳。」'}, q:'ok',
        r:{en:'“Right? I basically live on caffeine now,” he grins.',zh:'「对吧？我现在基本靠咖啡因活着，」他咧嘴笑。'}},
      {t:{en:'“Great — let me walk you through our full service menu.”',zh:'「好——让我跟你介绍我们完整的服务清单。」'}, q:'poor',
        r:{en:'“Uh… I kind of just wanted to vent, haha.” He leans back a bit.',zh:'「呃……我其实只是想吐吐苦水，哈哈。」他往后靠了靠。'}}
    ],
    signals:[
      { svc:{en:'BO & AML — beneficial ownership register',zh:'受益权与反洗钱——受益所有权登记册'},
        line:{en:'Half these emails I don’t even understand. The investor’s lawyer keeps asking about some “beneficial ownership register”. Bro, what even is that? Do I have one?',
              zh:'这些邮件我一半都看不懂。投资人的律师一直在问什么「受益所有权登记册」。兄弟，那到底是什么？我有吗？'},
        opts:[
          {t:{en:'“Do you know who your ultimate individual owners are on paper? That’s basically what the BO register captures — has anyone set it up for the company?”',zh:'「你知道公司在纸面上的最终个人所有者是谁吗？受益所有权登记册大致就是记录这个——有人帮公司设立过吗？」'}, q:'good',
            r:{en:'“…No idea if it’s set up. That’s exactly the thing they keep chasing me on.” Bingo.',zh:'「……不知道有没有设立。那正是他们一直追着我要的东西。」正中要害。'}},
          {t:{en:'“Ya, lawyers love their jargon.”',zh:'「是啊，律师就爱用术语。」'}, q:'ok',
            r:{en:'“For real,” he says, and scrolls to the next email.',zh:'「真的，」他说着，滑到下一封邮件。'}},
          {t:{en:'“We handle BO registers — let me send you a quote right now.”',zh:'「我们处理受益所有权登记册——我现在就发报价给你。」'}, q:'poor',

/* ---------- Game state & flow ---------- */
var S=null, pendingName='';
function newGame(name, key){
  var p = PROSPECTS[key];
  S = { name:name, key:key,
        beats:[], idx:0, log:[],
        results:[], rapport:false, hardSell:false, coldOpen:false };
  var opener = { kind:'opener', line:L(p.openers[rint(p.openers.length)]), options:p.openerOpts };
  var sigBeats = shuffle(p.signals).map(function(s){ return {kind:'signal', sig:s}; });
  S.beats = [opener].concat(sigBeats);
  pushLine(S.beats[0]);
  render();
}
function pushLine(beat){ S.log.push({who:'them', text: beat.kind==='opener'?beat.line:L(beat.sig.line)}); }
function cur(){ return S.beats[S.idx]; }
function beatOpts(c){ return c.kind==='opener' ? c.options : c.sig.opts; }

function render(){
  VIEW = render;
  var p = PROSPECTS[S.key];
  var logHTML = S.log.map(function(m){
    if(m.who==='coach') return '<div class="msg coach '+(m.cls||'')+'">'+m.text+'</div>';
    return '<div class="msg '+m.who+'">'+m.text+'</div>';
  }).join('');
  var c = cur();
  var choices = beatOpts(c).map(function(o,i){
    return '<div class="choice" onclick="choose('+i+')">'+ ( (LANG==='zh'? o.t.zh : o.t.en) ) +'</div>';
  }).join('');
  app.innerHTML = '<div class="card">'
    + '<div class="who"><div class="em">'+p.em+'</div>'
    +   '<div><div class="n">'+nm(p)+'</div><div class="s">'+sb(p)+'</div></div>'
    +   '<div style="margin-left:auto" class="prog">'+T('Turn ','第 ')+(S.idx+1)+' / '+S.beats.length+'</div></div>'
    + '<div class="log">'+logHTML+'</div>'
    + '<div class="choices">'+choices+'</div>'
    + '</div>';
  var log=app.querySelector('.log'); if(log) log.scrollTop=log.scrollHeight;
  window.scrollTo(0,0);
}

function choose(i){
  var c = cur(), o = beatOpts(c)[i];
  S.log.push({who:'me', text: L(o.t)});
  S.log.push({who:'them', text: L(o.r)});
  // scoring + coaching
  if(c.kind==='opener'){
    if(o.q==='good') S.rapport=true;
    else if(o.q==='poor'){ S.hardSell=true; S.coldOpen=true;
      S.log.push({who:'coach', cls:'bad', text:T('⚠️ Opening with a pitch puts a prospect on guard. Warm up first — ask about them.','⚠️ 一开口就推销会让对方戒备。先暖场——先问问他们。')}); }
  } else {
    var sig=c.sig;
    if(o.q==='good'){ S.results.push({svc:sig.svc, caught:true, sig:sig});
      S.log.push({who:'coach', cls:'good', text:'✅ '+T('Signal spotted → ','捕捉到信号 → ')+L(sig.svc)}); }
    else if(o.q==='ok'){ S.results.push({svc:sig.svc, caught:false, noticed:true, sig:sig}); }
    else { S.results.push({svc:sig.svc, caught:false, noticed:false, sig:sig}); S.hardSell=true;
      S.log.push({who:'coach', cls:'bad', text:'⚠️ '+T('You jumped to a hard sell — the seminar’s golden rule is: spot, ask, route — don’t pitch.','你太快硬销了——研讨会的黄金法则是：发现、提问、引导——别推销。')}); }
  }
  S.idx++;
  if(S.idx < S.beats.length){ pushLine(cur()); render(); }
  else finish();
}

/* ---------- Debrief + score ---------- */
function scoreOf(){
  var caught = S.results.filter(function(r){return r.caught;}).length;
  var noticed = S.results.filter(function(r){return !r.caught && r.noticed;}).length;
  var pts = caught*30 + noticed*5 + (S.rapport?5:0) + (S.hardSell?0:5);
  return { caught:caught, noticed:noticed, pts:Math.max(0,Math.min(100,pts)) };
}
function finish(){
  var p=PROSPECTS[S.key], sc=scoreOf();
  S.log.push({who:'them', text:L(p.closer)});
  var entry={ name:S.name, key:S.key, prospect:p.name, em:p.em, score:sc.pts, ts:Date.now() };
  var board=loadBoard(); board.push(entry); board.sort(function(a,b){return b.score-a.score;}); saveBoard(board);
  var rank=board.findIndex(function(e){return e.ts===entry.ts && e.name===entry.name;})+1;
  var medal = rank===1?'🥇':rank===2?'🥈':rank===3?'🥉':'';

  function render2(){
    var caughtList = S.results.filter(function(r){return r.caught;});
    var missList  = S.results.filter(function(r){return !r.caught;});
    var verdict = sc.pts>=90 ? T('Master prospector — spotted every signal without a single hard sell.','顶级挖掘高手——每个信号都捕捉到了，一次硬销都没有。')
      : sc.pts>=70 ? T('Sharp. You read the room well and asked good questions.','敏锐。你很会看场合，也问了好问题。')
      : sc.pts>=45 ? T('Warming up — you caught some signals, but a few slipped by.','渐入佳境——你捕捉到了一些信号，但也漏了几个。')
      : T('Needs practice. Listen for the throwaway comment, then ask ONE good question.','需要多练。留意那些随口的话，然后问一个好问题。');

    var caughtHTML = caughtList.length
      ? '<ul>'+caughtList.map(function(r){return '<li>✅ <b>'+L(r.svc)+'</b></li>';}).join('')+'</ul>'
      : '<p class="lead" style="font-size:13px">'+T('None this time — the signals were there, waiting for the right question.','这次一个都没有——信号就在那里，等着对的问题。')+'</p>';
    var missHTML = missList.length
      ? '<ul>'+missList.map(function(r){
          var good=null; r.sig.opts.forEach(function(o){ if(o.q==='good') good=o; });
          return '<li>🕳️ <b>'+L(r.svc)+'</b><br><span style="color:var(--mute);font-size:12.5px">'+T('Could have asked: ','本可以问：')+'“'+L(good.t)+'”</span></li>';
        }).join('')+'</ul>'
      : '<p class="lead" style="font-size:13px">'+T('Nothing missed — beautiful work!','一个都没漏——漂亮！')+'</p>';

    var logHTML = S.log.map(function(m){
      if(m.who==='coach') return '<div class="msg coach '+(m.cls||'')+'">'+m.text+'</div>';
      return '<div class="msg '+m.who+'">'+m.text+'</div>';
    }).join('');

    app.innerHTML = '<div class="card">'
      + '<div class="finalscore">'+(medal?'<div class="medal">'+medal+'</div>':'<div class="medal">☕</div>')
      +   '<div style="color:var(--mute);font-size:13px;letter-spacing:1px;text-transform:uppercase">'+T(nm(p)+' · your prospecting score',nm(p)+' · 你的挖掘评分')+'</div>'
      +   '<div class="big">'+sc.pts+' / 100</div>'
      +   '<div class="verdict">'+verdict+' &nbsp;·&nbsp; '+T('Rank #'+rank+' of '+board.length,'第 '+rank+' 名，共 '+board.length+' 人')+'</div></div>'
      + '<div class="debrief"><h4>☕ '+T('Signals you caught','你捕捉到的信号')+' ('+sc.caught+'/3)</h4><div class="catch">'+caughtHTML+'</div>'
      +   '<h4 style="margin-top:12px">🕳️ '+T('Signals you missed','你错过的信号')+'</h4><div class="miss">'+missHTML+'</div>'
      +   '<div class="ideal" style="margin-top:12px;padding-top:10px;border-top:1px dashed #bfe0cc">'
      +     (S.hardSell ? ('⚠️ '+T('You slipped into a hard sell. The seminar’s point: prospects buy protection from consequences they can’t see — spot the signal, ask one diagnostic question, and route the lead. Don’t pitch.','你陷入了硬销。研讨会的重点：客户买的是「看不见的后果」的保障——发现信号、问一个诊断性问题、把线索引导好。别推销。'))
      :                    ('🎯 '+T('You never hard-sold — exactly right. Spot the signal, ask one good question, route the lead.','你全程没硬销——完全正确。发现信号、问一个好问题、把线索引导好。')) )+'</div></div>'
      + '<div class="method"><b>'+T('The method','这套方法')+':</b> '+T('Signal → Service → Question. Every throwaway comment (“a friend set up my company…”, “I just take money out when I need it…”) is a signal that maps to a Muchen service. Your job is to hear it and ask ONE sharp question — not to sell.','信号 → 服务 → 提问。每一句随口的话（「朋友帮我注册了公司……」「我需要钱就拿……」）都是对应某项沐宸服务的信号。你的任务是听出来、问一个犀利的问题——而不是推销。')+'</div>'
      + '<details style="margin-top:12px"><summary style="cursor:pointer;color:var(--navy);font-weight:700;font-size:13.5px">'+T('Replay the conversation','回看对话')+'</summary><div class="log" style="margin-top:8px">'+logHTML+'</div></details>'
      + '<h4 style="margin:20px 0 0;color:var(--navy);font-family:Cambria,Georgia,serif">🏆 '+T('Leaderboard','排行榜')+'</h4>'
      + boardTable(board, entry.ts)
      + '<div class="nav"><button class="btn ghost" onclick="home()">'+T('Another prospect →','换一位对象 →')+'</button><button class="btn gold" onclick="startWith(\''+S.key+'\',true)">'+T('Retry this one →','重试这位 →')+'</button></div>'
      + '</div>';
    window.scrollTo(0,0);
  }
  VIEW = render2; render2();
}

/* ---------- Leaderboard (local) ---------- */
function loadBoard(){ try{return JSON.parse(localStorage.getItem('kopitalk_leaderboard')||'[]');}catch(e){return [];} }
function saveBoard(b){ try{localStorage.setItem('kopitalk_leaderboard', JSON.stringify(b.slice(0,50)));}catch(e){} }
function boardTable(board, myTs){
  var rows=board.slice(0,10).map(function(e,i){
    var medal=i===0?'🥇':i===1?'🥈':i===2?'🥉':(i+1);
    var pr = LANG==='zh' && PROSPECTS[e.key] ? PROSPECTS[e.key].nameZh : (e.prospect||'');
    return '<tr class="'+(e.ts===myTs?'me':'')+'"><td>'+medal+'</td><td>'+e.name+'</td><td>'+(e.em||'')+' '+pr+'</td><td class="sc">'+e.score+'</td></tr>';
  }).join('');
  return '<div class="lbwrap"><table class="lb"><tr><th>#</th><th>'+T('Player','玩家')+'</th><th>'+T('Prospect','对象')+'</th><th style="text-align:right">'+T('Score','分数')+'</th></tr>'+rows+'</table></div>';
}
function showBoard(){
  VIEW=showBoard;
  var board=loadBoard();
  app.innerHTML='<div class="card"><h2 class="scene-title">🏆 '+T('Leaderboard','排行榜')+'</h2>'
    + (board.length? boardTable(board,-1) : '<p class="lead">'+T('No games played yet. Be the first to spot a prospect.','还没有人玩过。成为第一个发现潜在客户的人。')+'</p>')
    + '<div class="nav"><span></span><button class="btn gold" onclick="home()">'+T('← Back','← 返回')+'</button></div></div>';
  window.scrollTo(0,0);
}

/* ---------- Home + setup ---------- */
function home(){
  VIEW=home; S=null;
  app.innerHTML='<div class="card">'
    + '<h2 class="scene-title">☕ '+T('Sit down for a kopi','坐下来喝杯咖啡')+'</h2>'
    + '<p class="lead">'+T('At the seminar you learned to <b>spot prospects by listening</b> — a throwaway comment is a <b>signal</b> that maps to a Muchen service. Here, you chat with a business owner over coffee. Read the signals, ask <b>one</b> good diagnostic question, and route the lead — <b>without hard-selling</b>.','在研讨会上你学会了<b>靠倾听发现潜在客户</b>——一句随口的话就是对应某项沐宸服务的<b>信号</b>。在这里，你和一位生意人喝咖啡聊天。读出信号、问<b>一个</b>好的诊断性问题、把线索引导好——<b>但别硬销</b>。')+'</p>'
    + '<p class="lead" style="margin-top:10px">'+T('Every prospect and the order of their signals are randomised, so no two coffees are the same.','每位对象和信号出现的顺序都是随机的，所以没有两杯咖啡是一样的。')+'</p>'
    + '<div class="nav"><button class="btn ghost" onclick="showBoard()">🏆 '+T('Leaderboard','排行榜')+'</button><button class="btn gold" onclick="enterName()">'+T('Order a coffee →','点杯咖啡 →')+'</button></div>'
    + '</div>';
  window.scrollTo(0,0);
}
function enterName(){
  VIEW=enterName;
  app.innerHTML='<div class="card"><h2 class="scene-title">'+T('Before we sit down…','坐下之前……')+'</h2>'
    + '<p class="lead">'+T('What’s your name? (This is how you’ll appear on the leaderboard.)','你叫什么名字？（这将是你在排行榜上的名字。）')+'</p>'
    + '<input class="name" id="nm" maxlength="22" placeholder="'+T('e.g. Aisha, Team Blue, Desk 3','例如：Aisha、蓝队、3 号桌')+'" />'
    + '<div class="nav"><button class="btn ghost" onclick="home()">'+T('← Back','← 返回')+'</button><button class="btn primary" onclick="choosePro()">'+T('Next →','下一步 →')+'</button></div></div>';
  var el=document.getElementById('nm'); if(pendingName) el.value=pendingName; el.focus();
  el.addEventListener('keydown',function(e){ if(e.key==='Enter') choosePro(); });
}
function choosePro(){
  var v=(document.getElementById('nm')?document.getElementById('nm').value:'').trim();
  if(document.getElementById('nm')){ if(!v){document.getElementById('nm').focus();return;} pendingName=v; }
  VIEW=choosePro;
  var cards=Object.keys(PROSPECTS).map(function(k){var p=PROSPECTS[k];
    return '<div class="pick" onclick="startWith(\''+k+'\')"><div class="em">'+p.em+'</div>'
      + '<div><h3>'+nm(p)+'</h3><div class="sub">'+sb(p)+'</div></div></div>';
  }).join('');
  app.innerHTML='<div class="card"><h2 class="scene-title">'+T('Who do you sit with?','你要和谁坐？')+'</h2>'
    + '<p class="lead">'+T('Pick a prospect — or take pot luck. Each carries three hidden signals.','选一位对象——或碰碰运气。每位都藏着三个信号。')+'</p>'
    + '<div class="grid">'+cards+'</div>'
    + '<div class="nav"><button class="btn ghost" onclick="enterName()">'+T('← Back','← 返回')+'</button><button class="btn gold" onclick="startWith(\'random\')">🎲 '+T('Random table','随机一桌')+'</button></div></div>';
  window.scrollTo(0,0);
}
function startWith(key, retry){
  if(key==='random'){ var ks=Object.keys(PROSPECTS); key=ks[rint(ks.length)]; }
  newGame(pendingName || (retry? (S&&S.name):'') || T('You','你'), key);
}

paintLang();
home();
</script>
<audio id="bgm" src="/henesys-floral-life.mp3" loop preload="auto"></audio>
<button id="bgmBtn" class="bgm-btn off" aria-label="Toggle background music" title="Music">🔈</button>
<script>
(function(){
  var a=document.getElementById('bgm'), b=document.getElementById('bgmBtn'), on=false, started=false;
  a.volume=0.28;
  function paint(){ b.textContent=on?'🔊':'🔈'; b.classList.toggle('off',!on); }
  function set(s){ on=s; if(on){ a.play().catch(function(){on=false;paint();}); } else { a.pause(); }
    try{localStorage.setItem('muchen_bgm',on?'1':'0');}catch(e){} paint(); }
  b.addEventListener('click',function(e){ e.stopPropagation(); started=true; set(!on); });
  function kick(){ if(started) return; started=true;
    var pref='1'; try{var v=localStorage.getItem('muchen_bgm'); if(v!==null)pref=v;}catch(e){}
    if(pref!=='0') set(true);
    document.removeEventListener('pointerdown',kick);
  }
  document.addEventListener('pointerdown',kick); paint();
})();
</script>
</body>
</html>
