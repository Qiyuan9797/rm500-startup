<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<meta name="theme-color" content="#141B3D"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>Kopi Talk — Spot the Prospect (Muchen)</title>
<style>
  :root{
    --navy:#0B6E40; --navy2:#0E7A46; --blue:#12925A; --ice:#BCE8CE; --ice2:#E4F6EC;
    --gold:#15C06A; --gold2:#46D98F; --ink:#123524; --mute:#5C7A69; --white:#fff;
    --good:#1f8a54; --bad:#c0392b; --paper:#F7FCF9;
    --shadow:0 12px 34px rgba(6,40,24,.20);
  }
  *{box-sizing:border-box}
  html{-webkit-text-size-adjust:100%}
  body{margin:0;font-family:"Segoe UI",Calibri,Arial,sans-serif;color:var(--ink);
    background:radial-gradient(1200px 600px at 50% -10%,#1FA35E 0%,#0E7A46 40%,#064E2B 100%);
    background-attachment:fixed;-webkit-tap-highlight-color:transparent;
    min-height:100vh;min-height:100dvh;
    padding:22px 14px 40px;
    padding-left:max(14px,env(safe-area-inset-left));padding-right:max(14px,env(safe-area-inset-right))}
  .wrap{max-width:720px;margin:0 auto}
  header.top{display:flex;justify-content:space-between;align-items:flex-end;gap:12px;flex-wrap:wrap;margin-bottom:16px}
  .brand .kick{color:var(--gold);font-weight:700;letter-spacing:3px;font-size:11px}
  .brand h1{margin:2px 0 0;color:#fff;font-family:Cambria,Georgia,serif;font-size:25px;font-weight:800}
  .brand h1 span{color:var(--gold2)}

  .card{background:var(--paper);border-radius:20px;box-shadow:var(--shadow);padding:24px;animation:pop .3s ease}
  @keyframes pop{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
  .lead{color:var(--mute);font-size:15px;line-height:1.6}
  .scene-title{font-family:Cambria,Georgia,serif;color:var(--navy);font-size:23px;font-weight:800;margin:0 0 6px}

  .grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:20px}
  @media(max-width:620px){.grid{grid-template-columns:1fr}}
  .pick{border:2px solid var(--ice);background:#fff;border-radius:16px;padding:16px;cursor:pointer;transition:.16s;-webkit-user-select:none;user-select:none;display:flex;gap:12px;align-items:flex-start}
  .pick:hover{border-color:var(--gold);transform:translateY(-3px);box-shadow:var(--shadow)}
  .pick:active{transform:scale(.99)}
  .pick .em{font-size:30px;line-height:1}
  .pick h3{margin:0 0 3px;color:var(--navy);font-size:17px}
  .pick .sub{color:var(--mute);font-size:12.5px;line-height:1.45}

  .nav{display:flex;justify-content:space-between;gap:10px;margin-top:22px;align-items:center}
  button.btn{border:0;border-radius:11px;padding:12px 20px;font-weight:800;font-size:14px;cursor:pointer;font-family:inherit;-webkit-user-select:none;user-select:none;touch-action:manipulation}
  button.btn:active{transform:scale(.97)}
  .btn.primary{background:var(--navy);color:#fff}.btn.primary:hover{background:var(--blue)}
  .btn.gold{background:var(--gold);color:#fff}.btn.gold:hover{background:var(--gold2)}
  .btn.ghost{background:#fff;color:var(--navy);border:1.5px solid var(--ice)}.btn.ghost:hover{border-color:var(--blue)}
  .btn:disabled{opacity:.5;cursor:not-allowed}

  /* chat */
  .who{display:flex;align-items:center;gap:11px;border-bottom:1px solid #E7ECF6;padding-bottom:12px;margin-bottom:4px}
  .who .em{font-size:30px}
  .who .n{font-weight:800;color:var(--navy);font-size:17px}
  .who .s{font-size:12px;color:var(--mute);line-height:1.35}
  .log{display:flex;flex-direction:column;gap:10px;padding:14px 2px;min-height:200px;max-height:56vh;overflow-y:auto;-webkit-overflow-scrolling:touch}
  .msg{max-width:82%;padding:10px 14px;border-radius:16px;font-size:14.5px;line-height:1.5;white-space:pre-wrap;word-wrap:break-word;animation:pop .25s ease}
  .msg.them{align-self:flex-start;background:#EEF2FB;color:var(--ink);border-bottom-left-radius:5px}
  .msg.me{align-self:flex-end;background:var(--navy);color:#fff;border-bottom-right-radius:5px}
  .msg.err{align-self:center;background:#FDECEA;color:#a5301f;font-size:13px;max-width:100%}
  .typing{align-self:flex-start;background:#EEF2FB;border-radius:16px;border-bottom-left-radius:5px;padding:12px 16px;display:inline-flex;gap:4px}
  .typing i{width:7px;height:7px;border-radius:50%;background:#9aa6bf;display:inline-block;animation:bl 1s infinite}
  .typing i:nth-child(2){animation-delay:.15s}.typing i:nth-child(3){animation-delay:.3s}
  @keyframes bl{0%,60%,100%{opacity:.3;transform:translateY(0)}30%{opacity:1;transform:translateY(-3px)}}

  .composer{display:flex;gap:8px;align-items:flex-end;border-top:1px solid #E7ECF6;padding-top:12px}
  textarea.inp{flex:1;resize:none;min-height:46px;max-height:120px;padding:12px 14px;border:2px solid var(--ice);border-radius:12px;font-size:16px;font-family:inherit;line-height:1.4}
  textarea.inp:focus{outline:none;border-color:var(--gold)}
  .send{background:var(--gold);color:#fff;border:0;border-radius:12px;min-width:52px;height:46px;font-size:18px;font-weight:800;cursor:pointer}
  .send:active{transform:scale(.95)} .send:disabled{opacity:.5}

  .hint{font-size:12px;color:var(--mute);margin-top:8px;text-align:center}
  .debrief{background:#EAF7F0;border:1px solid #BFE6CF;border-radius:14px;padding:16px 18px;margin-top:8px;font-size:14.5px;line-height:1.65;color:var(--ink)}
  .debrief b{color:var(--navy)}
  .method{background:#E4F6EC;border:1px solid #BFE6CF;border-radius:12px;padding:12px 14px;margin-top:14px;font-size:13px;color:var(--navy)}
  .method b{color:var(--blue)}
  .setup{background:#FDECEA;border:1px solid #f2c4bc;border-radius:12px;padding:14px 16px;font-size:13.5px;line-height:1.6;color:#7a2018}
  .setup code{background:#fff;border:1px solid #e6c9c2;border-radius:5px;padding:1px 5px;font-size:12.5px}

  .foot{color:var(--ice);text-align:center;font-size:11.5px;margin-top:22px;line-height:1.6}
  .foot a{color:var(--gold2);text-decoration:none}

  @media(hover:none){.pick:hover{border-color:var(--ice);transform:none;box-shadow:none}}
  @media(max-width:560px){
    body{padding:12px 12px 24px}
    .card{padding:18px 15px;border-radius:16px}
    .brand h1{font-size:20px}
    .log{max-height:50vh}
    button.btn{flex:1;min-height:46px}
    .nav>span:empty{display:none}
  }
  .bgm-btn{position:fixed;right:14px;bottom:14px;z-index:60;width:44px;height:44px;border-radius:50%;border:0;
    background:rgba(255,255,255,.92);color:var(--navy);font-size:19px;cursor:pointer;line-height:1;
    box-shadow:0 5px 16px rgba(6,40,24,.3);transition:.15s}
  .bgm-btn:active{transform:scale(.92)} .bgm-btn.off{opacity:.55}
  @media(max-width:560px){.bgm-btn{right:10px;bottom:10px;width:40px;height:40px;font-size:17px}}
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <div class="brand">
      <div class="kick">MUCHEN CORPORATE SERVICES · SEMINAR RECAP</div>
      <h1>Kopi <span>Talk</span></h1>
    </div>
  </header>
  <div id="app"></div>
  <div class="foot">
    An AI role-play to practise <b>Signal → Service → Question</b> from “Spotting Prospects Through Corporate Knowledge”.<br>
    Also play <a href="/">RM500 Startup</a> · <a href="/nasi-lemak">Nasi Lemak Empire</a> · A training simulation, not advice.
  </div>
</div>

<script>
var app = document.getElementById('app');
var PERSONAS = {
  may:    {em:'☕', name:'Aunty May', sub:'Runs a busy café. A friend set up her company years ago; she just wants to grow.'},
  danish: {em:'💻', name:'Danish',    sub:'Startup founder closing a funding round, drowning in lawyer emails.'},
  tan:    {em:'🏭', name:'Uncle Tan',  sub:'25 years running a family business. Thinking about slowing down.'},
  mei:    {em:'🧋', name:'Mei',        sub:'Fast-growing app business. Too busy growing to think about admin.'}
};
var KICKOFF = '(You sit down at the kopitiam with your coffee. Greet me and start chatting.)';
var S = null; // {key, history:[{role,content}], busy}

function home(){
  S = null;
  var cards = Object.keys(PERSONAS).map(function(k){
    var p = PERSONAS[k];
    return '<div class="pick" onclick="start(\''+k+'\')"><div class="em">'+p.em+'</div>'
      + '<div><h3>'+p.name+'</h3><div class="sub">'+p.sub+'</div></div></div>';
  }).join('');
  app.innerHTML = '<div class="card">'
    + '<h2 class="scene-title">Grab a coffee. Find a prospect.</h2>'
    + '<p class="lead">You bump into a business owner at the kopitiam and get chatting. Somewhere in the small talk, they’ll drop a <b>signal</b> — a stray line that hints at a problem Muchen can solve. Your job: <b>listen, spot the signal, and ask one good question</b>. You don’t need to close anything.</p>'
    + '<p class="lead" style="margin-top:8px">Chat naturally, then tap <b>“Wrap up & get feedback”</b> and an AI coach will score how many signals you caught.</p>'
    + '<div class="grid">'+cards+'</div>'
    + '<div class="nav"><span></span><button class="btn primary" onclick="start(rand())">🎲 Surprise me →</button></div>'
    + '</div>';
  window.scrollTo(0,0);
}
function rand(){ var k = Object.keys(PERSONAS); return k[Math.floor(Math.random()*k.length)]; }

function start(key){
  S = { key:key, history:[], busy:true };
  renderChat();
  send(null, true); // fetch opening line
}

function renderChat(){
  var p = PERSONAS[S.key];
  var log = S.history.map(function(m){
    return '<div class="msg '+(m.role==='assistant'?'them':(m.role==='err'?'err':'me'))+'">'+esc(m.content)+'</div>';
  }).join('');
  if(S.busy) log += '<div class="typing"><i></i><i></i><i></i></div>';
  app.innerHTML = '<div class="card">'
    + '<div class="who"><div class="em">'+p.em+'</div><div><div class="n">'+p.name+'</div><div class="s">'+p.sub+'</div></div></div>'
    + '<div class="log" id="log">'+log+'</div>'
    + '<div class="composer">'
    +   '<textarea class="inp" id="inp" rows="1" placeholder="Say something…" '+(S.busy?'disabled':'')+'></textarea>'
    +   '<button class="send" id="sendb" onclick="onSend()" '+(S.busy?'disabled':'')+'>➤</button>'
    + '</div>'
    + '<div class="hint">💬 Chat like it’s real. When you’re ready, wrap up for your score.</div>'
    + '<div class="nav"><button class="btn ghost" onclick="home()">← Leave</button>'
    +   '<button class="btn gold" id="wrapb" onclick="wrapUp()" '+(S.busy||S.history.length<2?'disabled':'')+'>☕ Wrap up & get feedback</button></div>'
    + '</div>';
  var inp = document.getElementById('inp');
  if(inp){
    autosize(inp); inp.focus();
    inp.addEventListener('input', function(){ autosize(inp); });
    inp.addEventListener('keydown', function(e){ if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); onSend(); } });
  }
  scrollLog();
}
function autosize(t){ t.style.height='auto'; t.style.height=Math.min(120,t.max||t.scrollHeight)+'px'; t.style.height=Math.min(120,t.scrollHeight)+'px'; }
function scrollLog(){ var l=document.getElementById('log'); if(l) l.scrollTop=l.scrollHeight; }
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function onSend(){
  var inp = document.getElementById('inp'); if(!inp) return;
  var v = inp.value.trim(); if(!v) return;
  inp.value=''; send(v);
}

function send(text, opening){
  if(text){ S.history.push({role:'user', content:text}); }
  S.busy = true; renderChat();
  var msgs = opening ? [{role:'user', content:KICKOFF}] : S.history.slice();
  api({ persona:S.key, messages:msgs, mode:'chat' }).then(function(reply){
    S.history.push({role:'assistant', content:reply}); S.busy=false; renderChat();
  }).catch(function(e){ handleErr(e); });
}

function wrapUp(){
  S.busy = true; renderChat();
  api({ persona:S.key, messages:S.history.slice(), mode:'debrief' }).then(function(reply){
    S.busy = false; renderDebrief(reply);
  }).catch(function(e){ handleErr(e); });
}

function renderDebrief(text){
  var p = PERSONAS[S.key];
  app.innerHTML = '<div class="card">'
    + '<div class="who"><div class="em">'+p.em+'</div><div><div class="n">Coffee with '+p.name+' — your debrief</div><div class="s">How well did you spot the signals?</div></div></div>'
    + '<div class="debrief">'+fmt(text)+'</div>'
    + '<div class="method"><b>The method:</b> Catch the <b>signal</b> → name the <b>service</b> → ask <b>one question</b>. You don’t close the sale — you spot the opening and route the lead.</div>'
    + '<div class="nav"><button class="btn ghost" onclick="start(\''+S.key+'\')">↺ Retry '+p.name+'</button>'
    +   '<button class="btn gold" onclick="home()">Another prospect →</button></div>'
    + '</div>';
  window.scrollTo(0,0);
}
function fmt(t){
  return esc(t)
    .replace(/\*\*(.+?)\*\*/g,'<b>$1</b>')
    .replace(/^\s*[-•]\s?(.*)$/gm,'&nbsp;&nbsp;• $1')
    .replace(/\n/g,'<br>');
}

function api(body){
  return fetch('/api/coffee',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify(body)})
    .then(function(r){ return r.json().then(function(j){ return {ok:r.ok, j:j}; }); })
    .then(function(res){
      if(!res.ok || (res.j && res.j.error)){
        var err = new Error((res.j && (res.j.error)) || 'error');
        err.code = res.j && res.j.error; err.detail = res.j && res.j.detail;
        throw err;
      }
      return res.j.reply;
    });
}

function handleErr(e){
  S.busy = false;
  if(e && e.code === 'ai_not_configured'){ renderSetup(); return; }
  S.history.push({role:'err', content:'⚠️ Hiccup reaching the AI'+(e && e.detail?': '+e.detail:'')+'. Try again.'});
  renderChat();
}

function renderSetup(){
  app.innerHTML = '<div class="card"><h2 class="scene-title">☕ Almost ready — switch on the AI</h2>'
    + '<p class="lead">This game talks to Claude to role-play the prospect. It just needs an Anthropic API key wired into Vercel (one-time):</p>'
    + '<div class="setup" style="margin-top:12px">'
    +   '1. Get a key at <b>console.anthropic.com</b> → API Keys.<br>'
    +   '2. In <b>Vercel → your project → Settings → Environment Variables</b>, add <code>ANTHROPIC_API_KEY</code> = your key (all environments).<br>'
    +   '3. <b>Redeploy</b> (Deployments → ⋯ → Redeploy).'
    + '</div>'
    + '<p class="lead" style="margin-top:12px;font-size:13px"><b>No API key?</b> Run it on one laptop with your Claude subscription instead: <code>node local-server.js</code> in the project folder, then open <code>localhost:8787/coffee-talk</code> (needs the <code>claude</code> CLI logged in). Great for a projected screen.</p>'
    + '<p class="lead" style="margin-top:8px;font-size:13px">Tip: for many phones on the hosted version, set <code>MODEL</code> in <code>api/coffee.js</code> to <code>claude-haiku-4-5</code> — faster and cheaper.</p>'
    + '<div class="nav"><span></span><button class="btn gold" onclick="home()">← Back</button></div></div>';
  window.scrollTo(0,0);
}

home();
</script>
<audio id="bgm" src="/henesys-floral-life.mp3" loop preload="auto"></audio>
<button id="bgmBtn" class="bgm-btn off" aria-label="Toggle background music" title="Music">🔈</button>
<script>
(function(){
  var a=document.getElementById('bgm'), b=document.getElementById('bgmBtn'), on=false, started=false;
  a.volume=0.28;
  function paint(){ b.textContent=on?'🔊':'🔈'; b.classList.toggle('off',!on); }
  function set(s){ on=s; if(on){ a.play().catch(function(){on=false;paint();}); } else { a.pause(); }
    try{localStorage.setItem('muchen_bgm',on?'1':'0');}catch(e){} paint(); }
  b.addEventListener('click',function(e){ e.stopPropagation(); started=true; set(!on); });
  function kick(){ if(started) return; started=true;
    var pref='1'; try{var v=localStorage.getItem('muchen_bgm'); if(v!==null)pref=v;}catch(e){}
    if(pref!=='0') set(true);
    document.removeEventListener('pointerdown',kick);
  }
  document.addEventListener('pointerdown',kick); paint();
})();
</script>
</body>
</html>
